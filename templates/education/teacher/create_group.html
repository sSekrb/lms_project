<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать группу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/">🎓 Умный школьник</a>
            <a href="{% url 'teacher_groups' %}" class="btn btn-light">← Назад к группам</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Создать новую группу</h1>

        <div class="card mt-3">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Название группы</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Выберите учеников</label>
                        <select name="students" multiple class="form-control" size="8">
                            {% for student in students %}
                            <option value="{{ student.id }}">{{ student.username }} ({{ student.email }})</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Удерживайте Ctrl для выбора нескольких</small>
                    </div>
                    <button type="submit" class="btn btn-success">Создать группу</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
