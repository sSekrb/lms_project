<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать группу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/">🎓 Умный школьник — Панель учителя</a>
            <div>
                <a href="{% url 'teacher_dashboard' %}" class="btn btn-light me-2">Курсы</a>
                <a href="{% url 'teacher_groups' %}" class="btn btn-light me-2">Группы</a>
                <a href="/" class="btn btn-light">На сайт</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>✏️ Редактировать группу: {{ group.name }}</h1>

        <div class="card mt-3">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Название группы</label>
                        <input type="text" name="name" class="form-control" value="{{ group.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Выберите учеников</label>
                        <select name="students" multiple class="form-control" size="8">
                            {% for student in students %}
                                <option value="{{ student.id }}" 
                                    {% if student in group.students.all %}selected{% endif %}>
                                    {{ student.username }} ({{ student.email }})
                                </option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Удерживайте Ctrl для выбора нескольких</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'group_detail' group.id %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
